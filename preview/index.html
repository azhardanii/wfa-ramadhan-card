<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Tema Eid Card Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f9fafb; }
        
        /* Animasi Loading Skeleton */
        .skeleton-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* Tekstur Pattern Islamik untuk Miniatur Card */
        .pattern-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.05' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="antialiased text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="font-bold text-xl text-emerald-800 tracking-tight">Eid<span class="text-yellow-600">Card</span>.</div>
            <div class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                Total Tema: <span id="total-count" class="font-bold text-gray-800">Memuat... <i class="fas fa-circle-notch fa-spin ml-1 text-emerald-600"></i></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Pilih Tema Spesialmu</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Katalog undangan digital eksklusif yang super cepat. Pilih kombinasi warna dan gaya favoritmu untuk hari kemenangan.</p>
        </div>

        <div id="loading-state" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <script>
                for(let i=0; i<8; i++) {
                    document.write(`
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="w-full h-48 bg-gray-200 skeleton-pulse"></div>
                            <div class="p-5">
                                <div class="w-20 h-4 bg-gray-200 rounded skeleton-pulse mb-3"></div>
                                <div class="w-3/4 h-6 bg-gray-200 rounded skeleton-pulse mb-4"></div>
                                <div class="w-full h-10 bg-gray-100 rounded skeleton-pulse"></div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div id="error-state" class="hidden text-center py-16">
            <div class="text-5xl mb-4">🥲</div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Gagal Memuat Katalog</h3>
            <p class="text-gray-500" id="error-message">Terjadi kesalahan saat mengambil data dari GitHub.</p>
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            </div>
    </main>

    <footer class="py-6 text-center bg-white border-t border-gray-200 mt-auto">
        <div class="text-[12px] text-gray-400 font-medium">
            © 2026 Eid Card Premium Showcase
        </div>
    </footer>

    <script>
        const gridContainer = document.getElementById('catalog-grid');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const countDisplay = document.getElementById('total-count');
        const errorMessage = document.getElementById('error-message');
        
        // PENGATURAN GITHUB (Pastikan sudah benar)
        const githubOwner = 'azhardanii';
        const githubRepo = 'wfa-ramadhan-card';
        const folderName = 'preview'; 

        // Warna Mapping untuk CSS Mockup
        const colorMap = {
            "sage": { hex: "#84A98C", light: "#dbe8df" },
            "midnight": { hex: "#1E3A8A", light: "#dbeafe" },
            "terracotta": { hex: "#D97757", light: "#fceeea" },
            "emerald": { hex: "#065F46", light: "#d1fae5" },
            "dusty-pink": { hex: "#D4A5A5", light: "#fae8e8" },
            "monochrome": { hex: "#52525B", light: "#e4e4e7" },
            "lavender": { hex: "#A78BFA", light: "#ede9fe" },
            "mustard": { hex: "#EAB308", light: "#fef08a" },
            "maroon": { hex: "#9F1239", light: "#ffe4e6" },
            "teal": { hex: "#14B8A6", light: "#ccfbf1" }
        };

        async function fetchDynamicFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${folderName}`);
                
                if (!response.ok) {
                    throw new Error(response.status === 403 ? "Limit API GitHub tercapai (coba lagi 1 jam lagi)" : "Folder tidak ditemukan atau repo private");
                }
                
                const data = await response.json();

                const htmlFiles = data.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                
                // Menghilangkan status loading
                loadingState.style.display = 'none';
                
                if (htmlFiles.length === 0) {
                    throw new Error("Folder preview kosong atau tidak ada file HTML tema.");
                }

                // Tampilkan Grid & Update Jumlah
                gridContainer.classList.remove('hidden');
                countDisplay.innerHTML = `${htmlFiles.length} <span class="text-gray-500 font-normal">Tema Tersedia</span>`;
                
                let counter = 1;

                htmlFiles.forEach(file => {
                    const fileNameClean = file.name.replace('.html', '');
                    const parts = fileNameClean.split('-');
                    
                    let number = String(counter).padStart(3, '0');
                    let colorName = "Tema";
                    let styleName = "Kustom";
                    let themeColor = "#64748b"; // Warna cadangan
                    let bgLight = "#f1f5f9"; // Warna bg cadangan

                    if (parts.length >= 4) {
                        number = parts[1];
                        colorName = parts[2];
                        styleName = parts.slice(3).join(' ');
                        
                        if (colorMap[colorName]) {
                            themeColor = colorMap[colorName].hex;
                            bgLight = colorMap[colorName].light;
                        }
                    } else {
                        colorName = fileNameClean.replace(/-/g, ' ');
                        styleName = '';
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col border border-gray-100 overflow-hidden group transform hover:-translate-y-1";
                    
                    // KITA GUNAKAN CSS MOCKUP SEBAGAI PENGGANTI IFRAME
                    // Ini meload dalam 0.001 detik tanpa menyedot RAM komputer pengunjung!
                    card.innerHTML = `
                        <div class="w-full h-48 relative overflow-hidden flex items-center justify-center pattern-bg border-b border-gray-100" style="background-color: ${bgLight}">
                            
                            <div class="w-24 h-32 bg-white rounded-md shadow-lg flex flex-col items-center pt-4 px-2 relative z-10 border-t-4 transition-transform duration-500 group-hover:scale-110" style="border-color: ${themeColor}">
                                <div class="w-6 h-6 rounded-full mb-3 flex items-center justify-center" style="background-color: ${bgLight}">
                                    <div class="w-3 h-3 rounded-full" style="background-color: ${themeColor}"></div>
                                </div>
                                <div class="w-14 h-1.5 rounded-full mb-2" style="background-color: ${themeColor}80"></div>
                                <div class="w-10 h-1.5 rounded-full bg-gray-200 mb-4"></div>
                                <div class="w-16 h-4 rounded-sm mt-auto mb-3" style="background-color: ${themeColor}20"></div>
                            </div>

                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-20 backdrop-blur-sm">
                                <a href="${file.name}" target="_blank" class="bg-white text-gray-900 font-semibold px-5 py-2.5 rounded-full text-sm hover:scale-105 transition-transform shadow-lg flex items-center gap-2">
                                    <i class="fas fa-play text-emerald-600"></i> Buka Tema
                                </a>
                            </div>
                        </div>
                        
                        <div class="p-5 flex-grow flex flex-col justify-between bg-white relative z-30">
                            <div>
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center gap-2">
                                        <span class="w-3.5 h-3.5 rounded-full shadow-inner" style="background-color: ${themeColor}"></span>
                                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">TEMA-${number}</span>
                                    </div>
                                </div>
                                <h3 class="font-bold text-gray-800 text-lg capitalize mb-1 leading-tight">${colorName}</h3>
                                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide flex items-center gap-1">
                                    <i class="fas fa-layer-group text-gray-300"></i> ${styleName}
                                </p>
                            </div>
                        </div>
                    `;
                    
                    gridContainer.appendChild(card);
                    counter++;
                });

            } catch (error) {
                console.error(error);
                loadingState.style.display = 'none';
                errorState.classList.remove('hidden');
                errorMessage.innerText = error.message;
                countDisplay.innerHTML = `<span class="text-red-500">Error</span>`;
            }
        }

        // Jalankan saat web dibuka
        fetchDynamicFiles();
    </script>
</body>
</html>
