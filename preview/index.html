<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Tema Eid Card Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f9fafb; }
        
        /* Teknik Rahasia: Iframe Scaling untuk Live Thumbnail yang Pas */
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            /* Perubahan 1: Ubah padding-top: 150% MENJADI 100% AGAR MENJADI PERSEGI (kurangi ruang atas/bawah) */
            padding-top: 100%; 
            overflow: hidden;
            /* Perubahan 2: Berikan warna latar belakang default yang gelap */
            background: #1f2937; 
            border-radius: 0.75rem 0.75rem 0 0;
        }
        
        .thumbnail-iframe {
            position: absolute;
            /* Perubahan 3: Sesuaikan penskalaan agar lebih dekat (bukan 4x, tapi 2x) */
            top: 0;
            left: 0;
            width: 200%; /* Diperbesar 2x lipat (sebelumnya 4x) */
            height: 200%;
            transform: scale(0.5); /* Diperkecil 0.5x agar pas (sebelumnya 0.25x) */
            /* Perubahan 4: Pusatkan penskalaan agar pas di tengah kartu */
            transform-origin: center center;
            pointer-events: none;
            border: none;
        }

        /* Loading Animation */
        .loading-skeleton {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            z-index: 1;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="antialiased text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="font-bold text-xl text-emerald-800 tracking-tight">Eid<span class="text-yellow-600">Card</span>.</div>
            <div class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                Total Tema: <span id="total-count" class="font-bold text-gray-800">Memuat... <i class="fas fa-circle-notch fa-spin ml-1 text-emerald-600"></i></span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Pilih Tema Spesialmu</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Katalog Surat Ucapan Idul Fitri Eksklusif. Pilih kombinasi warna dan gaya favoritmu untuk hari kemenangan.</p>
        </div>

        <div id="loading-state" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <script>
                for(let i=0; i<8; i++) {
                    document.write(`
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="w-full h-48 bg-gray-200 skeleton-pulse"></div>
                            <div class="p-5">
                                <div class="w-3/4 h-6 bg-gray-200 rounded skeleton-pulse mb-4"></div>
                                <div class="w-full h-10 bg-gray-100 rounded skeleton-pulse"></div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div id="error-state" class="hidden text-center py-16">
            <div class="text-5xl mb-4">🥲</div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Gagal Memuat Katalog</h3>
            <p class="text-gray-500" id="error-message">Terjadi kesalahan saat mengambil data dari GitHub.</p>
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            </div>
    </main>

    <footer class="py-6 text-center bg-white border-t border-gray-200 mt-auto">
        <div class="text-[12px] text-gray-400 font-medium">
            © 2026 Eid Card Premium Showcase
        </div>
    </footer>

    <script>
        const gridContainer = document.getElementById('catalog-grid');
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const countDisplay = document.getElementById('total-count');
        const errorMessage = document.getElementById('error-message');
        
        // PENGATURAN GITHUB
        const githubOwner = 'azhardanii';
        const githubRepo = 'wfa-ramadhan-card';
        const folderName = 'preview'; 

        // 1. KAMUS WARNA DITAMBAHKAN KEMBALI
        const colorMap = {
            "sage": "#84A98C",
            "midnight": "#1E3A8A",
            "terracotta": "#D97757",
            "emerald": "#065F46",
            "dusty-pink": "#D4A5A5",
            "monochrome": "#52525B",
            "lavender": "#A78BFA",
            "mustard": "#EAB308",
            "maroon": "#9F1239",
            "teal": "#14B8A6"
        };

        // Fungsi acak (Fisher-Yates Shuffle) agar tampilan tidak monoton
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function fetchDynamicFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${folderName}`);
                if (!response.ok) throw new Error("Limit API GitHub tercapai atau repo private.");
                
                const data = await response.json();

                // Ambil file HTML saja
                let htmlFiles = data.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                
                loadingState.style.display = 'none';
                
                if (htmlFiles.length === 0) {
                    throw new Error("Folder preview kosong.");
                }

                // ACAK URUTAN FILE DI SINI SEBELUM DITAMPILKAN!
                htmlFiles = shuffleArray(htmlFiles);

                gridContainer.classList.remove('hidden');
                countDisplay.innerHTML = `${htmlFiles.length} <span class="text-gray-500 font-normal">Tema Tersedia</span>`;
                
                let counter = 1;

                htmlFiles.forEach(file => {
                    const fileNameClean = file.name.replace('.html', '');
                    const parts = fileNameClean.split('-');
                    
                    let colorName = "Tema";
                    let styleName = "Kustom";
                    let themeColor = "#1f2937"; 

                    if (parts.length >= 4) {
                        colorName = parts[2];
                        styleName = parts.slice(3).join(' ');
                        
                        if (colorMap[colorName]) {
                            themeColor = colorMap[colorName];
                        }
                    } else {
                        colorName = fileNameClean.replace(/-/g, ' ');
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-xl shadow-sm hover:shadow-2xl transition-all duration-300 flex flex-col border border-gray-100 overflow-hidden group transform hover:-translate-y-1";
                    
                    card.innerHTML = `
                        <div class="thumbnail-wrapper pattern-bg border-b border-gray-100" style="background-color: ${themeColor}">
                            <div class="loading-skeleton skeleton-${counter}"></div>
                            
                            <iframe 
                                data-src="${file.name}" 
                                class="thumbnail-iframe lazy-iframe"
                                scrolling="no" 
                                tabindex="-1"
                                onload="document.querySelector('.skeleton-${counter}').style.display='none'">
                            </iframe>
                            
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
                                <a href="${file.name}" target="_blank" class="bg-white text-gray-900 font-semibold px-5 py-2.5 rounded-full text-sm hover:scale-105 transition-transform shadow-lg flex items-center gap-2">
                                    <i class="fas fa-play text-emerald-600"></i> Buka Tema
                                </a>
                            </div>
                        </div>
                        
                        <div class="p-5 flex-grow flex flex-col justify-between bg-white relative z-20">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg capitalize mb-1 leading-tight">${colorName}</h3>
                                <p class="text-xs font-medium text-gray-500 uppercase tracking-wide flex items-center gap-1">
                                    <i class="fas fa-layer-group text-gray-300"></i> ${styleName}
                                </p>
                            </div>
                        </div>
                    `;
                    
                    gridContainer.appendChild(card);
                    counter++;
                });

                // Jalankan Lazy Load
                initLazyLoad();

            } catch (error) {
                console.error(error);
                loadingState.style.display = 'none';
                errorState.classList.remove('hidden');
                errorMessage.innerText = error.message;
                countDisplay.innerHTML = `<span class="text-red-500">Error</span>`;
            }
        }

        // Lazy Load Iframe Observers
        function initLazyLoad() {
            var lazyIframes = [].slice.call(document.querySelectorAll("iframe.lazy-iframe"));

            if ("IntersectionObserver" in window) {
                let iframeObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            let iframe = entry.target;
                            iframe.src = iframe.dataset.src; 
                            iframe.classList.remove("lazy-iframe");
                            iframeObserver.unobserve(iframe);
                        }
                    });
                }, { rootMargin: "0px 0px 200px 0px" });

                lazyIframes.forEach(function(iframe) {
                    iframeObserver.observe(iframe);
                });
            } else {
                lazyIframes.forEach(function(iframe) {
                    iframe.src = iframe.dataset.src;
                });
            }
        }

        fetchDynamicFiles();
    </script>
</body>
</html>
