<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Tema Eid Card Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f9fafb; }
        
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 150%;
            overflow: hidden;
            background: #e5e7eb;
            border-radius: 0.75rem 0.75rem 0 0;
        }
        
        .thumbnail-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 400%;
            height: 400%;
            transform: scale(0.25);
            transform-origin: top left;
            pointer-events: none; 
            border: none;
        }

        .loading-skeleton {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            z-index: 1;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="font-bold text-xl text-emerald-800 tracking-tight">Eid<span class="text-yellow-600">Card</span>.</div>
            <div class="text-sm font-medium text-gray-500">Etalase Tema (<span id="total-count">0</span> Variasi)</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Pilih Tema Spesialmu</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Jelajahi ratusan variasi tema undangan digital eksklusif. Semua di-generate otomatis secara ajaib untuk momen kemenanganmu.</p>
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        const gridContainer = document.getElementById('catalog-grid');
        const countDisplay = document.getElementById('total-count');
        
        const githubOwner = 'azhardanii';
        const githubRepo = 'wfa-ramadhan-card';
        const folderName = 'preview'; 
        const colorMap = {
            "sage": "#84A98C", "midnight": "#1E3A8A", "terracotta": "#D97757",
            "emerald": "#065F46", "dusty-pink": "#D4A5A5", "monochrome": "#52525B",
            "lavender": "#A78BFA", "mustard": "#EAB308", "maroon": "#9F1239", "teal": "#14B8A6"
        };

        async function fetchDynamicFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/${folderName}`);
                
                if (!response.ok) throw new Error("Gagal memuat data dari GitHub API");
                
                const data = await response.json();

                const htmlFiles = data.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                
                countDisplay.innerText = htmlFiles.length;
                let counter = 1;

                htmlFiles.forEach(file => {
                    const fileNameClean = file.name.replace('.html', '');
                    const parts = fileNameClean.split('-');
                    
                    let number = String(counter).padStart(3, '0');
                    let colorName = "Tema";
                    let styleName = "Kustom";
                    let hexCode = "#e5e7eb";

                    if (parts.length >= 4) {
                        number = parts[1];
                        colorName = parts[2];
                        styleName = parts.slice(3).join(' ');
                        hexCode = colorMap[colorName] || hexCode;
                    } else {
                        colorName = fileNameClean.replace(/-/g, ' ');
                        styleName = '';
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white rounded-xl shadow-md hover:shadow-xl transition-shadow duration-300 flex flex-col border border-gray-100 overflow-hidden group";
                    
                    card.innerHTML = `
                        <div class="thumbnail-wrapper border-b border-gray-100">
                            <div class="loading-skeleton skeleton-${counter}"></div>
                            <iframe data-src="${file.name}" class="thumbnail-iframe lazy-iframe" onload="document.querySelector('.skeleton-${counter}').style.display='none'"></iframe>
                            
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
                                <a href="${file.name}" target="_blank" class="bg-white text-gray-900 font-semibold px-5 py-2 rounded-full text-sm hover:scale-105 transition-transform shadow-lg">
                                    Lihat Full Demo
                                </a>
                            </div>
                        </div>
                        
                        <div class="p-5 flex-grow flex flex-col justify-between">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="w-4 h-4 rounded-full border border-gray-200" style="background-color: ${hexCode}"></span>
                                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">No. ${number}</span>
                                </div>
                                <h3 class="font-bold text-gray-800 text-lg capitalize mb-1 leading-tight line-clamp-2">${colorName} <br><span class="text-sm font-medium text-gray-500">${styleName}</span></h3>
                            </div>
                            
                            <a href="${file.name}" target="_blank" class="mt-4 block w-full text-center border-2 border-emerald-600 text-emerald-700 hover:bg-emerald-600 hover:text-white font-semibold py-2 rounded-lg text-sm transition-colors">
                                Preview Tema
                            </a>
                        </div>
                    `;
                    
                    gridContainer.appendChild(card);
                    counter++;
                });

                initLazyLoad();

            } catch (error) {
                console.error(error);
                gridContainer.innerHTML = `<p class="text-red-500 text-center w-full col-span-full py-10">Gagal memuat daftar tema. Pastikan repositori bersifat publik dan limit API GitHub tidak tercapai.</p>`;
            }
        }

        function initLazyLoad() {
            var lazyIframes = [].slice.call(document.querySelectorAll("iframe.lazy-iframe"));

            if ("IntersectionObserver" in window) {
                let iframeObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            let iframe = entry.target;
                            iframe.src = iframe.dataset.src; 
                            iframe.classList.remove("lazy-iframe");
                            iframeObserver.unobserve(iframe);
                        }
                    });
                });

                lazyIframes.forEach(function(iframe) {
                    iframeObserver.observe(iframe);
                });
            } else {
                lazyIframes.forEach(function(iframe) {
                    iframe.src = iframe.dataset.src;
                });
            }
        }

        fetchDynamicFiles();
    </script>
</body>
</html>
